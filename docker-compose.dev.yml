services:
  # Redis
  redis:
    image: redis:7-alpine
    container_name: zrokui-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zrokui-backend
    ports:
      - "3666:3666"
    environment:
      - NODE_ENV=development
      - PORT=3666
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - redis
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:3666
    container_name: zrokui-frontend
    ports:
      - "3555:80"
    restart: unless-stopped

volumes:
  redis-data:
