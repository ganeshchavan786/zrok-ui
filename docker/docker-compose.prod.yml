version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: zrokui-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - zrokui-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  backend:
    image: ghcr.io/ganeshchavan786/zrok-ui/backend:latest
    container_name: zrokui-backend
    ports:
      - "3666:3666"
    environment:
      - NODE_ENV=production
      - PORT=3666
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - BASE_DOMAIN=${BASE_DOMAIN}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - INVITES_ONLY=${INVITES_ONLY:-false}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - zrokui-network
    volumes:
      - ./logs:/app/logs

  frontend:
    image: ghcr.io/ganeshchavan786/zrok-ui/frontend:latest
    container_name: zrokui-frontend
    ports:
      - "3555:80"
    restart: unless-stopped
    networks:
      - zrokui-network

volumes:
  redis-data:

networks:
  zrokui-network:
    driver: bridge
