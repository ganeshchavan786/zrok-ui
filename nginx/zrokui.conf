# /etc/nginx/sites-available/zrokui.conf
# Wildcard DNS: *.yourdomain.com → VPS IP
# TLS: certbot certonly --dns-cloudflare -d "*.yourdomain.com" -d "yourdomain.com"

# ── Redirect HTTP → HTTPS ────────────────────────────────
server {
    listen 80;
    server_name yourdomain.com *.yourdomain.com;
    return 301 https://$host$request_uri;
}

# ── Frontend Dashboard (yourdomain.com) ──────────────────
server {
    listen 443 ssl http2;
    server_name yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        proxy_pass         http://127.0.0.1:3555;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        # React SPA fallback
        proxy_intercept_errors on;
        error_page 404 = @spa;
    }
    location @spa { proxy_pass http://127.0.0.1:3555; }
}

# ── Backend API (api.yourdomain.com) ─────────────────────
server {
    listen 443 ssl http2;
    server_name api.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    location / {
        proxy_pass         http://127.0.0.1:3666;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        add_header         Access-Control-Allow-Origin "https://yourdomain.com" always;
    }
}

# ── Tunnel Traffic (*.yourdomain.com) ────────────────────
# zrok frontend handles this on port 8090
server {
    listen 443 ssl http2;
    server_name *.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    location / {
        proxy_pass         http://127.0.0.1:8090;
        proxy_http_version 1.1;

        # WebSocket support (for zrok tunnels)
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Long-lived tunnel connections
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }
}
