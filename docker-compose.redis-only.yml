version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: zrokui-redis
    command: redis-server --requirepass d8a206cf62819982762e49ecc5d38057fa4a0962fba3d93f034dc38aff121293
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  redis-data:
